version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - ECOSPHERE_SECRET_KEY=${ECOSPHERE_SECRET_KEY:-ecosphere_fallback_secret}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=sqlite:///database/ecosphere.db
    volumes:
      - ./database:/app/database  # Persist SQLite data locally
    restart: unless-stopped
