version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - ECOSPHERE_SECRET_KEY=${ECOSPHERE_SECRET_KEY:-ecosphere_fallback_secret}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=postgresql://ecosphere:password@db:5432/ecosphere
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=ecosphere
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ecosphere
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
